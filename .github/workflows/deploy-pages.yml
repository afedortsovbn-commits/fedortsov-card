name: Публикация сайта

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Получить код
        uses: actions/checkout@v4

      - name: Установить Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Установить зависимости
        run: npm ci

      - name: Проверить код
        run: npm run lint

      - name: Собрать сайт
        run: npm run build

      - name: Подготовить GitHub Pages
        uses: actions/configure-pages@v5

      - name: Загрузить сборку
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Опубликовать на GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
