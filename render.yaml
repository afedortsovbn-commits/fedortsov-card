services:
  - type: web
    name: fedortsov-card
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /var/data/db.json
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_TOKEN_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
    disks:
      - name: fedortsov-card-data
        mountPath: /var/data
        sizeGB: 1
